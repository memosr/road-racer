<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Racer × Starknet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --road: #1a1a2e;
    --lane: #e0e000;
    --asphalt: #16213e;
    --neon: #00f5ff;
    --neon2: #ff006e;
    --neon3: #ffbe0b;
    --green: #06d6a0;
    --panel: rgba(0,245,255,0.07);
    --border: rgba(0,245,255,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  /* ── GAME CANVAS ── */
  #gameCanvas {
    display: block;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,245,255,0.15), 0 0 80px rgba(0,245,255,0.05);
    border-radius: 4px;
  }

  /* ── HUD PANEL ── */
  #hud {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 4px;
  }

  .hud-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  .hud-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--neon);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .hud-value.accent { color: var(--neon); }
  .hud-value.gold   { color: var(--neon3); }
  .hud-value.green  { color: var(--green); }

  #speedBar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  #speedFill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon), var(--neon2));
    border-radius: 3px;
    transition: width 0.3s;
    width: 20%;
  }

  #fuelBar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  #fuelFill {
    height: 100%;
    background: linear-gradient(90deg, #ff4d4d, var(--neon3), var(--green));
    border-radius: 3px;
    transition: width 0.2s;
    width: 100%;
  }

  /* WALLET block */
  #walletBlock {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  #btnConnect {
    width: 100%;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
    padding: 8px 0;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #btnConnect:hover {
    background: rgba(0,245,255,0.12);
  }
  #btnConnect:disabled {
    opacity: 0.4;
    cursor: default;
  }

  #walletStatus {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    min-height: 14px;
    line-height: 1.4;
    word-break: break-all;
  }
  #walletStatus.ok { color: var(--green); }

  /* TOKEN display */
  #tokenRow {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .token-icon {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon3);
    border: 1px solid rgba(255,190,11,0.5);
    flex-shrink: 0;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,26,0.88);
    border-radius: 4px;
  }
  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--neon);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--neon);
    margin-bottom: 8px;
  }

  .overlay-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .overlay-score {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }

  .overlay-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--neon);
    opacity: 0.6;
    margin-bottom: 28px;
  }

  .btn-start {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    background: var(--neon);
    color: #0a0a1a;
    border: none;
    padding: 12px 32px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 700;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn-start:hover { opacity: 0.85; }

  #canvasWrap { position: relative; }

  /* flash effect */
  #flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.05s;
  }
  #flash.red  { background: rgba(255,0,80,0.25); }
  #flash.gold { background: rgba(255,190,11,0.22); }

  /* ── GAME OVER ACTIONS ── */
  .overlay-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    width: 260px;
  }

  .btn-claim {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    width: 100%;
    padding: 11px 0;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 700;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
    border: none;
  }
  .btn-claim:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-claim:active { transform: translateY(0); }
  .btn-claim:disabled { opacity: 0.35; cursor: default; transform: none; }

  .btn-claim.primary {
    background: var(--neon3);
    color: #1a1000;
  }
  .btn-claim.secondary {
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
  }

  .tx-status {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    min-height: 16px;
    letter-spacing: 0.5px;
  }
  .tx-status.ok   { color: var(--green); }
  .tx-status.err  { color: #ff4466; }
  .tx-status.wait { color: var(--neon3); }

  /* ── DONATE BLOCK ── */
  #donateBlock {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .donate-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .btn-donate {
    flex: 1;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    background: transparent;
    border: 1px solid var(--neon3);
    color: var(--neon3);
    padding: 7px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .btn-donate:hover { background: rgba(255,190,11,0.12); }
  .btn-donate:disabled { opacity: 0.3; cursor: default; }

  #donateStatus {
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
    min-height: 13px;
    word-break: break-all;
  }
  #donateStatus.ok   { color: var(--green); }
  #donateStatus.err  { color: #ff4466; }
  #donateStatus.wait { color: var(--neon3); }
</style>
</head>
<body>

<div id="wrapper">
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="360" height="600"></canvas>
    <div id="flash"></div>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">ROAD RACER</div>
      <div class="overlay-sub" id="overlaySub">← → ↑ ↓ ok tuşları veya W A S D ile sür</div>
      <div class="overlay-score" id="overlayScore" style="display:none"></div>
      <div class="overlay-label" id="overlayLabel" style="display:none">PUAN</div>

      <!-- Game-over actions (hidden on menu) -->
      <div class="overlay-actions" id="overlayActions" style="display:none">
        <button class="btn-claim primary" id="btnClaim">Skoru Kaydet &amp; 10 STRK Gönder</button>
        <div class="tx-status" id="claimStatus"></div>
      </div>

      <button class="btn-start" id="btnStart">BAŞLA</button>
    </div>
  </div>

  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Puan</div>
      <div class="hud-value accent" id="hudScore">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">En Yüksek</div>
      <div class="hud-value gold" id="hudBest">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Hız</div>
      <div class="hud-value" id="hudSpeed">1x</div>
      <div id="speedBar"><div id="speedFill"></div></div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Yakıt</div>
      <div id="fuelBar"><div id="fuelFill"></div></div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Jeton</div>
      <div id="tokenRow">
        <div class="token-icon"></div>
        <div class="hud-value green" id="hudTokens">0</div>
      </div>
    </div>

    <div id="walletBlock">
      <div class="hud-label">Starknet</div>
      <button id="btnConnect">Cüzdan Bağla</button>
      <div id="walletStatus">Bağlı değil</div>
    </div>

    <div id="donateBlock">
      <div class="hud-label">Geliştiriciyi Destekle</div>
      <div class="donate-row">
        <button class="btn-donate" data-amount="500">500</button>
        <button class="btn-donate" data-amount="1000">1K</button>
        <button class="btn-donate" data-amount="5000">5K STRK</button>
      </div>
      <div id="donateStatus"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const W = 360, H = 600;
const LANES = [60, 130, 200, 270, 300]; // x centers — 3 lanes + shoulders
const LANE_XS = [80, 180, 280];         // 3 driving lanes

// Vertical play area bounds
const PLAYER_Y_MIN = 80;    // furthest forward (top)
const PLAYER_Y_MAX = H - 80; // furthest back (bottom)
const PLAYER_Y_DEFAULT = H - 140;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let state = 'menu'; // menu | playing | dead
let score = 0, bestScore = 0;
let tokens = 0;
let fuel = 100;
let speed = 2.5;        // base scroll speed
let speedMult = 1;
let elapsed = 0;        // ms
let lastTime = 0;
let pointAccum = 0;     // fractional point accumulator

let playerLane = 1;     // 0=left 1=mid 2=right
let playerX = LANE_XS[1];
let playerTargetX = LANE_XS[1];
let playerY = PLAYER_Y_DEFAULT;
let playerTargetY = PLAYER_Y_DEFAULT;
// Current relative speed offset: positive = driving faster than traffic (forward), negative = braking
let playerSpeedOffset = 0; // range roughly -speed..+speed*1.5
const PLAYER_W = 36, PLAYER_H = 60;

// tilt angle for visual lean when moving sideways
let playerTilt = 0;

let obstacles = [];
let pickups = [];
let particles = [];

let roadOffset = 0;
let dashOffset = 0;

// Input
const keys = {};
let laneMoveCooldown = 0;

// ════════════════════════════════════════════
//  ROAD DRAWING
// ════════════════════════════════════════════
function drawRoad() {
  // asphalt
  ctx.fillStyle = '#12121f';
  ctx.fillRect(40, 0, W - 80, H);

  // shoulders
  ctx.fillStyle = '#1e1e33';
  ctx.fillRect(0, 0, 40, H);
  ctx.fillRect(W - 40, 0, 40, H);

  // edge lines
  ctx.strokeStyle = '#ffffff18';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(42, 0); ctx.lineTo(42, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-42, 0); ctx.lineTo(W-42, H); ctx.stroke();

  // lane dashes
  ctx.strokeStyle = '#e0e00044';
  ctx.lineWidth = 3;
  ctx.setLineDash([30, 24]);
  ctx.lineDashOffset = -dashOffset;

  for (const lx of [130, 230]) {
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // road texture stripes (subtle)
  ctx.strokeStyle = '#ffffff05';
  ctx.lineWidth = 1;
  for (let y = (roadOffset % 60) - 60; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(42, y); ctx.lineTo(W-42, y); ctx.stroke();
  }
}

// ════════════════════════════════════════════
//  PLAYER CAR
// ════════════════════════════════════════════
function drawPlayer() {
  const x = playerX - PLAYER_W/2;
  const y = playerY;
  const w = PLAYER_W, h = PLAYER_H;

  // perspective scale: smaller when near top (far away), full size at bottom
  const depthT = (playerY - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN); // 0=far, 1=near
  const scale = 0.55 + depthT * 0.45;

  ctx.save();
  ctx.translate(playerX, playerY + h/2);
  ctx.scale(scale, scale);
  ctx.rotate(playerTilt);

  const ox = -w/2, oy = -h/2;

  // speed lines when going fast (forward)
  if (playerSpeedOffset > 0.5) {
    ctx.save();
    const lineAlpha = Math.min(0.5, playerSpeedOffset / 4);
    ctx.strokeStyle = `rgba(0,245,255,${lineAlpha})`;
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      const lx = ox + w/2 + i * (w * 0.4);
      const len = 10 + playerSpeedOffset * 6;
      ctx.beginPath(); ctx.moveTo(lx, oy + h + 4); ctx.lineTo(lx, oy + h + 4 + len); ctx.stroke();
    }
    ctx.restore();
  }

  // glow
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 14 + depthT * 8;

  // body
  ctx.fillStyle = '#00c8ff';
  ctx.beginPath(); ctx.roundRect(ox+4, oy+8, w-8, h-16, 5); ctx.fill();
  ctx.shadowBlur = 0;

  // roof
  ctx.fillStyle = '#0090b8';
  ctx.beginPath(); ctx.roundRect(ox+8, oy+16, w-16, h-32, 4); ctx.fill();

  // windshield
  ctx.fillStyle = '#a0e8ff88';
  ctx.beginPath(); ctx.roundRect(ox+9, oy+18, w-18, 14, 3); ctx.fill();

  // headlights
  ctx.fillStyle = '#ffffaa';
  ctx.shadowColor = '#ffff88'; ctx.shadowBlur = 8;
  ctx.fillRect(ox+4, oy+8, 6, 4);
  ctx.fillRect(ox+w-10, oy+8, 6, 4);
  ctx.shadowBlur = 0;

  // wheels
  ctx.fillStyle = '#222'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  for (const [wx, wy] of [[ox+1,oy+14],[ox+w-7,oy+14],[ox+1,oy+h-20],[ox+w-7,oy+h-20]]) {
    ctx.beginPath(); ctx.roundRect(wx, wy, 6, 10, 1); ctx.fill(); ctx.stroke();
  }

  // tail lights
  ctx.fillStyle = playerSpeedOffset < -0.3 ? '#ff8888' : '#ff3030';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = playerSpeedOffset < -0.3 ? 14 : 6;
  ctx.fillRect(ox+4, oy+h-12, 6, 4);
  ctx.fillRect(ox+w-10, oy+h-12, 6, 4);
  ctx.shadowBlur = 0;

  ctx.restore();

  // exhaust particles
  if (Math.random() < 0.3 + playerSpeedOffset * 0.05) spawnExhaust();
}

// ════════════════════════════════════════════
//  OBSTACLES
// ════════════════════════════════════════════
const OBS_TYPES = ['car_slow','car_slow','car_slow','truck','cone','cone'];
const CAR_COLORS = ['#e63946','#e9c46a','#95d5b2','#f4a261','#a8dadc'];

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  const isTruck = type === 'truck';
  const w = isTruck ? 42 : 36;
  const h = isTruck ? 80 : 60;
  obstacles.push({
    x: LANE_XS[lane],
    y: -h - 10,
    lane,
    type,
    w, h,
    color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)],
    speed: isTruck ? speed * 0.35 : speed * (0.45 + Math.random() * 0.25),
  });
}

function drawCar(o) {
  const w = o.w, h = o.h;
  const depthT = Math.max(0, Math.min(1, (o.y + h/2 - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN)));
  const scale = 0.45 + depthT * 0.55;

  ctx.save();
  ctx.translate(o.x, o.y + h/2);
  ctx.scale(scale, scale);
  const ox = -w/2, oy = -h/2;

  ctx.fillStyle = o.color;
  ctx.beginPath(); ctx.roundRect(ox+4, oy+8, w-8, h-16, 5); ctx.fill();
  ctx.fillStyle = darken(o.color, 0.7);
  ctx.beginPath(); ctx.roundRect(ox+8, oy+16, w-16, h-32, 3); ctx.fill();
  ctx.fillStyle = '#aaddff55';
  ctx.beginPath(); ctx.roundRect(ox+9, oy+h-30, w-18, 14, 3); ctx.fill();
  ctx.fillStyle = '#ff6030';
  ctx.fillRect(ox+4, oy+8, 5, 3);
  ctx.fillRect(ox+w-9, oy+8, 5, 3);
  ctx.fillStyle = '#222'; ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  for (const [wx, wy] of [[ox+1,oy+14],[ox+w-7,oy+14],[ox+1,oy+h-20],[ox+w-7,oy+h-20]]) {
    ctx.beginPath(); ctx.roundRect(wx, wy, 6, 9, 1); ctx.fill(); ctx.stroke();
  }
  if (o.type === 'truck') {
    ctx.fillStyle = darken(o.color, 0.5);
    ctx.beginPath(); ctx.roundRect(ox+4, oy+h*0.3, w-8, h*0.45, 3); ctx.fill();
  }
  ctx.restore();
}

function drawCone(o) {
  const depthT = Math.max(0, Math.min(1, (o.y - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN)));
  const scale = 0.45 + depthT * 0.55;
  ctx.save();
  ctx.translate(o.x, o.y + o.h/2);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#ff6000';
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-10, 16); ctx.lineTo(10, 16); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillRect(-8, 2, 16, 4);
  ctx.restore();
}

// ════════════════════════════════════════════
//  PICKUPS
// ════════════════════════════════════════════
function spawnPickup() {
  const lane = Math.floor(Math.random() * 3);
  const type = Math.random() < 0.45 ? 'fuel' : 'token';
  pickups.push({ x: LANE_XS[lane], y: -30, lane, type, r: 14, pulse: 0 });
}

function drawPickup(p) {
  p.pulse = (p.pulse + 0.08) % (Math.PI * 2);
  const glow = 6 + Math.sin(p.pulse) * 3;
  ctx.save();
  if (p.type === 'fuel') {
    ctx.shadowColor = '#06d6a0';
    ctx.shadowBlur = glow;
    ctx.fillStyle = '#06d6a0';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('F', p.x, p.y);
  } else {
    ctx.shadowColor = '#ffbe0b';
    ctx.shadowBlur = glow;
    ctx.fillStyle = '#ffbe0b';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a00';
    ctx.font = 'bold 11px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('◆', p.x, p.y);
  }
  ctx.restore();
}

// ════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════
function spawnExhaust() {
  const depthT = (playerY - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN);
  const scale = 0.55 + depthT * 0.45;
  particles.push({
    x: playerX + (Math.random()-0.5) * 8 * scale,
    y: playerY + PLAYER_H * scale * 0.5 + 10,
    vx: (Math.random()-0.5) * 0.5,
    vy: speed * 0.4 + Math.random(),
    life: 1, type: 'exhaust'
  });
}

function spawnBurst(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - speed*0.5,
      life: 1, color, type: 'burst' });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.type === 'exhaust' ? 0.06 : 0.04;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.7;
    if (p.type === 'exhaust') {
      ctx.fillStyle = '#ffffff33';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3*(1-p.life+0.3), 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = p.color || '#ffbe0b';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function checkCollisions() {
  const depthT = (playerY - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN);
  const scale = 0.55 + depthT * 0.45;
  const pw = (PLAYER_W - 8) * scale, ph = (PLAYER_H - 16) * scale;
  const px = playerX - pw/2, py = playerY + PLAYER_H/2 - ph/2 - 4;

  for (const o of obstacles) {
    const odepth = Math.max(0, Math.min(1, (o.y + o.h/2 - PLAYER_Y_MIN) / (PLAYER_Y_MAX - PLAYER_Y_MIN)));
    const oscale = 0.45 + odepth * 0.55;
    const ow = (o.w - 8) * oscale, oh = (o.h - 16) * oscale;
    const ox = o.x - ow/2, oy = o.y + o.h/2 - oh/2;
    if (rectsOverlap(px, py, pw, ph, ox, oy, ow, oh)) {
      flashScreen('red');
      die();
      return;
    }
  }

  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    const dx = playerX - p.x, dy = (playerY + PLAYER_H/2 * scale) - p.y;
    if (Math.sqrt(dx*dx + dy*dy) < (PLAYER_W/2 + p.r - 4) * scale) {
      if (p.type === 'fuel') {
        fuel = Math.min(100, fuel + 30);
        spawnBurst(p.x, p.y, '#06d6a0');
        flashScreen('gold');
      } else {
        tokens++;
        spawnBurst(p.x, p.y, '#ffbe0b');
        flashScreen('gold');
        if (window.__starknetOnScore) window.__starknetOnScore();
      }
      pickups.splice(i, 1);
    }
  }
}

// ════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════
let obsTimer = 0, obsInterval = 1.8;
let pickupTimer = 0, pickupInterval = 4.0;
let fuelTimer = 0;

function update(dt) {
  if (state !== 'playing') return;

  elapsed += dt;

  // speed ramp: every 10s add 0.18x, cap at 5x
  speedMult = Math.min(5, 1 + Math.floor(elapsed / 10000) * 0.18);
  speed = 2.5 * speedMult;
  obsInterval = Math.max(0.7, 1.8 - speedMult * 0.18);

  // ── VERTICAL INPUT ──
  const goingUp   = keys['ArrowUp']   || keys['w'] || keys['W'];
  const goingDown = keys['ArrowDown'] || keys['s'] || keys['S'];
  const vertSpd = 3.2 * speedMult;

  if (goingUp) {
    playerTargetY = Math.max(PLAYER_Y_MIN, playerTargetY - vertSpd);
    playerSpeedOffset = Math.min(speed * 1.6, playerSpeedOffset + 0.4); // accelerating forward
  } else if (goingDown) {
    playerTargetY = Math.min(PLAYER_Y_MAX, playerTargetY + vertSpd);
    playerSpeedOffset = Math.max(-speed * 0.7, playerSpeedOffset - 0.35); // braking
  } else {
    // drift back to default Y slowly
    playerTargetY += (PLAYER_Y_DEFAULT - playerTargetY) * 0.02;
    playerSpeedOffset *= 0.92; // friction
  }

  // smooth Y
  playerY += (playerTargetY - playerY) * 0.14;

  // tilt: lean when changing lanes
  const targetTilt = (playerTargetX - playerX) * 0.004;
  playerTilt += (targetTilt - playerTilt) * 0.15;

  // score: base 10/s × speedMult² + bonus when rushing forward
  const forwardBonus = Math.max(0, playerSpeedOffset / speed) * 1.5;
  pointAccum += (10 * speedMult * speedMult * (1 + forwardBonus)) * (dt / 1000);
  if (pointAccum >= 1) {
    const pts = Math.floor(pointAccum);
    score += pts;
    pointAccum -= pts;
  }

  // fuel drain — drains faster when rushing forward
  fuelTimer += dt / 1000;
  if (fuelTimer >= 0.25) {
    const drain = 0.8 * speedMult * (1 + Math.max(0, playerSpeedOffset / speed) * 0.5);
    fuel = Math.max(0, fuel - drain);
    fuelTimer = 0;
  }
  if (fuel <= 0) { die(); return; }

  // lane lerp X
  playerX += (playerTargetX - playerX) * 0.18;

  // road scroll — faster when player surges forward
  const scrollSpeed = speed + playerSpeedOffset * 0.6;
  roadOffset += scrollSpeed;
  dashOffset += scrollSpeed;

  // obstacles — relative speed depends on player vertical position and speed offset
  obsTimer += dt / 1000;
  if (obsTimer >= obsInterval) {
    spawnObstacle();
    obsTimer = 0;
  }
  // obstacles move relative to player: surge forward = obstacles come faster
  for (const o of obstacles) {
    const relSpd = (speed - o.speed) + playerSpeedOffset * 0.5;
    o.y += relSpd;
  }
  obstacles = obstacles.filter(o => o.y < H + 100);

  // pickups
  pickupTimer += dt / 1000;
  if (pickupTimer >= pickupInterval) {
    spawnPickup();
    pickupTimer = 0;
    pickupInterval = 3 + Math.random() * 3;
  }
  for (const p of pickups) p.y += scrollSpeed * 0.9;
  pickups = pickups.filter(p => p.y < H + 50);

  updateParticles(dt);
  checkCollisions();
  updateHUD();

  // input cooldown (lateral only)
  laneMoveCooldown = Math.max(0, laneMoveCooldown - dt);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawRoad();
  drawParticles();

  // sort by Y so closer (larger y) objects render on top
  const allObjs = [
    ...obstacles.map(o => ({ obj: o, y: o.y + o.h/2, type: 'obs' })),
    ...pickups.map(p => ({ obj: p, y: p.y, type: 'pickup' })),
  ].sort((a, b) => a.y - b.y);

  for (const item of allObjs) {
    if (item.type === 'obs') {
      if (item.obj.type === 'cone') drawCone(item.obj);
      else drawCar(item.obj);
    } else {
      drawPickup(item.obj);
    }
  }

  if (state === 'playing') drawPlayer();
}

function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════
//  START / DIE
// ════════════════════════════════════════════
function startGame() {
  score = 0; tokens = 0; fuel = 100; elapsed = 0;
  speed = 2.5; speedMult = 1; pointAccum = 0;
  obstacles = []; pickups = []; particles = [];
  obsTimer = 0; pickupTimer = 0; fuelTimer = 0;
  playerLane = 1; playerX = LANE_XS[1]; playerTargetX = LANE_XS[1];
  playerY = PLAYER_Y_DEFAULT; playerTargetY = PLAYER_Y_DEFAULT;
  playerSpeedOffset = 0; playerTilt = 0;
  roadOffset = 0; dashOffset = 0;
  state = 'playing';

  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('overlayScore').style.display = 'none';
  document.getElementById('overlayLabel').style.display = 'none';
  document.getElementById('overlayActions').style.display = 'none';

  if (window.__starknetOnStart) window.__starknetOnStart();
}

function die() {
  state = 'dead';
  if (score > bestScore) bestScore = score;

  document.getElementById('overlayTitle').textContent = 'GAME OVER';
  document.getElementById('overlaySub').textContent = walletConnected
    ? '10 STRK göndererek skoru kaydet'
    : 'Cüzdanını bağla ve skoru kaydet';
  document.getElementById('overlayScore').textContent = score;
  document.getElementById('overlayScore').style.display = 'block';
  document.getElementById('overlayLabel').style.display = 'block';

  // show claim action
  const actions = document.getElementById('overlayActions');
  actions.style.display = 'flex';
  const claimBtn = document.getElementById('btnClaim');
  claimBtn.disabled = false;
  claimBtn.textContent = 'Skoru Kaydet & 1 STRK Gönder';
  document.getElementById('claimStatus').textContent = walletConnected ? '' : 'Önce cüzdanını bağla →';
  document.getElementById('claimStatus').className = walletConnected ? '' : 'err';

  document.getElementById('btnStart').textContent = 'TEKRAR OYNA';
  document.getElementById('overlay').classList.remove('hidden');

  updateHUD();
}

// ════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════
function updateHUD() {
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudBest').textContent = bestScore;
  document.getElementById('hudTokens').textContent = tokens;
  const s = speedMult.toFixed(1);
  document.getElementById('hudSpeed').textContent = s + 'x';
  document.getElementById('speedFill').style.width = Math.min(100, (speedMult-1)/4*100) + '%';
  document.getElementById('fuelFill').style.width = fuel + '%';
  if (fuel < 20) document.getElementById('fuelFill').style.background = '#ff4444';
  else document.getElementById('fuelFill').style.background = '';
}

//  FLASH
// ════════════════════════════════════════════
function flashScreen(color) {
  const el = document.getElementById('flash');
  el.className = color;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 80);
}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state !== 'playing') return;
  // lateral lane change on keydown (with cooldown for snappy feel)
  if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && laneMoveCooldown <= 0) {
    if (playerLane > 0) { playerLane--; playerTargetX = LANE_XS[playerLane]; laneMoveCooldown = 160; }
  }
  if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && laneMoveCooldown <= 0) {
    if (playerLane < 2) { playerLane++; playerTargetX = LANE_XS[playerLane]; laneMoveCooldown = 160; }
  }
  // prevent page scroll on arrow keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch support
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    // horizontal swipe → lane change
    if (Math.abs(dx) > 24 && laneMoveCooldown <= 0) {
      if (dx < 0 && playerLane > 0) { playerLane--; playerTargetX = LANE_XS[playerLane]; laneMoveCooldown = 160; }
      if (dx > 0 && playerLane < 2) { playerLane++; playerTargetX = LANE_XS[playerLane]; laneMoveCooldown = 160; }
    }
  } else {
    // vertical swipe → speed up / brake
    if (dy < -24) { playerTargetY = Math.max(PLAYER_Y_MIN, playerTargetY - 60); }
    if (dy > 24)  { playerTargetY = Math.min(PLAYER_Y_MAX, playerTargetY + 60); }
  }
}, { passive: false });

function darken(hex, f) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}
